
<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PickWell — Produtos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #4B8190;
    --teal-dark: #3a6570;
    --teal-light: #e8f2f4;
    --cream: #ECEDDA;
    --text-dark: #1e3035;
    --text-light: #7a9ba3;
    --white: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text-dark); min-height: 100vh; -webkit-font-smoothing: antialiased; }

  header { background: var(--cream); padding: 10px 20px; position: sticky; top: 0; z-index: 100; transition: background 0.3s ease; border-bottom: 1px solid rgba(75,129,144,0.08); }
  header.scrolled { background: #2f464c; border-bottom-color: transparent; padding: 8px 20px; }

  .logo-default { display: block; }
  .logo-default svg { height: 40px; width: auto; display: block; }
  .logo-scrolled { display: none; }
  .logo-scrolled svg { height: 40px; width: auto; display: block; }
  header.scrolled .logo-default { display: none; }
  header.scrolled .logo-scrolled { display: block; }

  .tagline { font-size: 11px; color: rgba(47,70,76,0.5); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 4px; transition: color 0.3s; }
  header.scrolled .tagline { color: rgba(236,237,218,0.6); }

  .filter-section { padding: 12px 16px 8px; background: var(--cream); position: sticky; top: 72px; z-index: 90; border-bottom: 1px solid rgba(75,129,144,0.1); }
  .filter-scroll { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
  .filter-scroll::-webkit-scrollbar { display: none; }
  .chip { flex-shrink: 0; border: 1.5px solid var(--teal); border-radius: 20px; padding: 5px 14px; font-size: 12px; font-weight: 500; background: transparent; color: var(--teal); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; white-space: nowrap; }
  .chip.active { background: var(--teal); color: var(--cream); }

  .count-bar { padding: 10px 16px 0; font-size: 12px; color: var(--text-light); }

  .grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; padding: 10px 12px 32px; }

  .card { background: var(--white); border-radius: 18px; border: 1px solid rgba(75,129,144,0.1); overflow: hidden; display: flex; flex-direction: column; transition: transform 0.15s; }
  .card:active { transform: scale(0.98); }

  .card-img-wrap { width: 100%; height: 110px; background: #f0f0ea; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .card-img-wrap img { width: 100%; height: 100%; object-fit: contain; padding: 10px; }
  .img-placeholder { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }

  .card-body { padding: 12px 12px 14px; display: flex; flex-direction: column; gap: 6px; flex: 1; }
  .card-brand { font-size: 10px; color: var(--teal); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }
  .card-name { font-size: 15px; font-weight: 700; color: var(--text-dark); line-height: 1.3; }

  .cat-badge { display: block; font-size: 11px; padding: 4px 10px; border-radius: 8px; font-weight: 500; width: 100%; }
  .cat-fit  { background: #dff2ec; color: #0d6b52; }
  .cat-prot { background: #fef0d8; color: #8a4e0a; }
  .cat-nat  { background: #e8f3dc; color: #3a6d10; }
  .cat-other{ background: var(--teal-light); color: var(--teal-dark); }

  .nutrients { display: grid; grid-template-columns: repeat(3,1fr); gap: 4px; margin-top: 2px; }
  .nut { background: #f2f2ec; border-radius: 8px; padding: 6px 4px; text-align: center; }
  .nut-val { display: block; font-size: 13px; font-weight: 700; color: var(--text-dark); line-height: 1.2; }
  .nut-label { display: block; font-size: 9px; color: var(--text-light); margin-top: 2px; }

  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
  .kcal-row { display: flex; align-items: baseline; gap: 3px; }
  .kcal-val { font-size: 14px; font-weight: 700; color: var(--teal); }
  .kcal-label { font-size: 11px; color: var(--text-light); }
  .pvp { font-size: 15px; font-weight: 700; color: var(--text-dark); font-family: 'DM Serif Display', serif; }

  .empty, .loading { grid-column: 1/-1; text-align: center; padding: 48px 20px; color: var(--text-light); font-size: 14px; }
  .error { grid-column: 1/-1; text-align: center; padding: 48px 20px; color: #c0392b; font-size: 13px; }

  footer { text-align: center; padding: 16px; font-size: 11px; color: var(--text-light); border-top: 1px solid rgba(75,129,144,0.1); font-style: italic; }
</style>
</head>

</header>

<div class="filter-section">
  <div class="filter-scroll" id="filters">
    <button class="chip active" data-cat="todos">Todos</button>
  </div>
</div>

<div class="count-bar" id="count"></div>

<div class="grid" id="grid">
  <div class="loading">A carregar produtos...</div>
</div>

<footer>Escolhe bem. Vive Melhor!</footer>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRXOryj6fO8iMD6s6FXp1nbhuHhpHughk3GZGRqK2b2Ehqv7pP4kzVjQMiLnWPtHQPbFTL4N6qe3HQS/pub?gid=0&single=true&output=csv";

let allProducts = [];
let activeFilter = "todos";

function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = lines[0].split(",").map(h => h.trim().replace(/^"|"$/g, ""));
  return lines.slice(1).map(line => {
    const vals = [];
    let cur = "", inQ = false;
    for (let c of line) {
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { vals.push(cur.trim()); cur = ""; }
      else cur += c;
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i] || "").replace(/^"|"$/g, ""));
    return obj;
  });
}

function catClass(cat) {
  if (!cat) return "cat-other";
  const c = cat.toLowerCase();
  if (c.includes("fit")) return "cat-fit";
  if (c.includes("prot")) return "cat-prot";
  if (c.includes("nat")) return "cat-nat";
  return "cat-other";
}

function buildFilters(products) {
  const cats = [...new Set(products.map(p => p["Categoria"]).filter(Boolean))];
  const bar = document.getElementById("filters");
  bar.innerHTML = '<button class="chip active" data-cat="todos">Todos</button>';
  cats.forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "chip";
    btn.dataset.cat = cat;
    btn.textContent = cat;
    bar.appendChild(btn);
  });
  bar.addEventListener("click", e => {
    const btn = e.target.closest(".chip");
    if (!btn) return;
    document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.cat;
    renderGrid();
  });
}

function renderGrid() {
  const grid = document.getElementById("grid");
  const countEl = document.getElementById("count");
  const list = activeFilter === "todos"
    ? allProducts
    : allProducts.filter(p => p["Categoria"] === activeFilter);

  countEl.textContent = list.length + " produto" + (list.length !== 1 ? "s" : "");

  if (list.length === 0) {
    grid.innerHTML = '<div class="empty">Nenhum produto disponível nesta categoria.</div>';
    return;
  }

  grid.innerHTML = list.map(p => {
    const imgUrl = p["Imagem URL"] || "";
    const pvp = p["PVP (€)"] ? parseFloat(p["PVP (€)"]).toFixed(2) + " €" : "";
    const kcal = p["Kcal por dose"] || "";
    const prot = p["Proteína"] ? parseFloat(p["Proteína"]).toFixed(1) + "g" : "—";
    const hidr = p["Hidratos de Carbono"] ? parseFloat(p["Hidratos de Carbono"]).toFixed(1) + "g" : "—";
    const fibra = p["Fibra"] ? parseFloat(p["Fibra"]).toFixed(1) + "g" : "—";
    const cat = p["Categoria"] || "";
    const nome = p["Produto"] || "";
    const marca = p["Marca"] || "";

    return `
      <div class="card">
        <div class="card-img-wrap">
          ${imgUrl ? `<img src="${imgUrl}" alt="${nome}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
          <div class="img-placeholder" style="${imgUrl ? 'display:none' : 'display:flex'}">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#b8c8cc" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          </div>
        </div>
        <div class="card-body">
          <span class="card-brand">${marca}</span>
          <span class="card-name">${nome}</span>
          <span class="cat-badge ${catClass(cat)}">${cat}</span>
          <div class="nutrients">
            <div class="nut"><span class="nut-val">${prot}</span><span class="nut-label">Proteína</span></div>
            <div class="nut"><span class="nut-val">${hidr}</span><span class="nut-label">Hidratos</span></div>
            <div class="nut"><span class="nut-val">${fibra}</span><span class="nut-label">Fibra</span></div>
          </div>
          <div class="card-footer">
            <div class="kcal-row">
              <span class="kcal-val">${kcal}</span>
              <span class="kcal-label"> kcal/dose</span>
            </div>
            <span class="pvp">${pvp}</span>
          </div>
        </div>
      </div>
    `;
  }).join("");
}

async function loadProducts() {
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error("Erro");
    const text = await res.text();
    const all = parseCSV(text);
    allProducts = all.filter(p => (p["Disponivel"] || "").toLowerCase() === "sim");
    buildFilters(allProducts);
    renderGrid();
  } catch (err) {
    document.getElementById("grid").innerHTML = '<div class="error">Não foi possível carregar os produtos. Tenta novamente mais tarde.</div>';
  }
}

loadProducts();

window.addEventListener('scroll', () => {
  const header = document.querySelector('header');
  if (window.scrollY > 10) {
    header.classList.add('scrolled');
  } else {
    header.classList.remove('scrolled');
  }
});
</script>
</body>
</html>
