
<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PickWell — Produtos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #4B8190;
    --teal-dark: #3a6570;
    --teal-light: #e8f2f4;
    --cream: #ECEDDA;
    --cream-dark: #d8d9c4;
    --text-dark: #1e3035;
    --text-mid: #4a6870;
    --text-light: #7a9ba3;
    --white: #ffffff;
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  header {
    background: var(--teal);
    padding: 20px 20px 16px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header svg { height: 32px; width: auto; }

  .tagline {
    font-size: 12px;
    color: rgba(236,237,218,0.7);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 6px;
    font-weight: 400;
  }

  .filter-section {
    padding: 14px 16px 8px;
    background: var(--cream);
    position: sticky;
    top: 82px;
    z-index: 90;
    border-bottom: 1px solid rgba(75,129,144,0.12);
  }

  .filter-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .filter-scroll::-webkit-scrollbar { display: none; }

  .chip {
    flex-shrink: 0;
    border: 1.5px solid var(--teal);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 500;
    background: transparent;
    color: var(--teal);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s ease;
    white-space: nowrap;
  }
  .chip.active, .chip:active {
    background: var(--teal);
    color: var(--cream);
  }

  .count-bar {
    padding: 10px 16px 0;
    font-size: 12px;
    color: var(--text-light);
    font-weight: 400;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
    padding: 10px 12px 32px;
  }

  .card {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid rgba(75,129,144,0.12);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform 0.15s ease;
  }
  .card:active { transform: scale(0.98); }

  .card-img-wrap {
    width: 100%;
    height: 88px;
    background: var(--teal-light);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .card-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    padding: 8px;
  }

  .img-placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
  }

  .card-body {
    padding: 9px 10px 11px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex: 1;
  }

  .card-brand {
    font-size: 10px;
    color: var(--teal);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .card-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dark);
    line-height: 1.35;
  }

  .cat-badge {
    display: inline-block;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
    width: fit-content;
  }
  .cat-fit    { background: #dff2ec; color: #0d6b52; }
  .cat-prot   { background: #fef0d8; color: #8a4e0a; }
  .cat-nat    { background: #e8f3dc; color: #3a6d10; }
  .cat-other  { background: var(--teal-light); color: var(--teal-dark); }

  .nutrients {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px;
    margin-top: 2px;
  }

  .nut {
    background: var(--cream);
    border-radius: 6px;
    padding: 5px 3px;
    text-align: center;
  }

  .nut-val {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dark);
    line-height: 1.2;
  }

  .nut-label {
    display: block;
    font-size: 9px;
    color: var(--text-light);
    margin-top: 1px;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 4px;
  }

  .kcal-wrap {
    display: flex;
    align-items: center;
    gap: 3px;
    background: var(--teal-light);
    border-radius: 6px;
    padding: 3px 7px;
  }

  .kcal {
    font-size: 12px;
    font-weight: 600;
    color: var(--teal-dark);
  }

  .kcal-label {
    font-size: 10px;
    color: var(--text-light);
  }

  .pvp {
    font-size: 14px;
    font-weight: 600;
    color: var(--teal);
    font-family: 'DM Serif Display', serif;
  }

  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 48px 20px;
    color: var(--text-light);
    font-size: 14px;
  }

  .loading {
    grid-column: 1 / -1;
    text-align: center;
    padding: 48px 20px;
    color: var(--text-light);
    font-size: 14px;
  }

  .error {
    grid-column: 1 / -1;
    text-align: center;
    padding: 48px 20px;
    color: #c0392b;
    font-size: 13px;
  }

  footer {
    text-align: center;
    padding: 16px;
    font-size: 11px;
    color: var(--text-light);
    border-top: 1px solid rgba(75,129,144,0.1);
  }
</style>
</head>
<body>

</header>

<div class="filter-section">
  <div class="filter-scroll" id="filters">
    <button class="chip active" data-cat="todos">Todos</button>
  </div>
</div>

<div class="count-bar" id="count"></div>

<div class="grid" id="grid">
  <div class="loading">A carregar produtos...</div>
</div>

<footer>Escolhe bem. Vive Melhor!</footer>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRXOryj6fO8iMD6s6FXp1nbhuHhpHughk3GZGRqK2b2Ehqv7pP4kzVjQMiLnWPtHQPbFTL4N6qe3HQS/pub?gid=0&single=true&output=csv";

let allProducts = [];
let activeFilter = "todos";

function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = lines[0].split(",").map(h => h.trim().replace(/^"|"$/g, ""));
  return lines.slice(1).map(line => {
    const vals = [];
    let cur = "", inQ = false;
    for (let c of line) {
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { vals.push(cur.trim()); cur = ""; }
      else cur += c;
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i] || "").replace(/^"|"$/g, ""));
    return obj;
  });
}

function catClass(cat) {
  if (!cat) return "cat-other";
  const c = cat.toLowerCase();
  if (c.includes("fit")) return "cat-fit";
  if (c.includes("prot")) return "cat-prot";
  if (c.includes("nat")) return "cat-nat";
  return "cat-other";
}

function buildFilters(products) {
  const cats = [...new Set(products.map(p => p["Categoria"]).filter(Boolean))];
  const bar = document.getElementById("filters");
  bar.innerHTML = '<button class="chip active" data-cat="todos">Todos</button>';
  cats.forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "chip";
    btn.dataset.cat = cat;
    btn.textContent = cat;
    bar.appendChild(btn);
  });
  bar.addEventListener("click", e => {
    const btn = e.target.closest(".chip");
    if (!btn) return;
    document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.cat;
    renderGrid();
  });
}

function renderGrid() {
  const grid = document.getElementById("grid");
  const countEl = document.getElementById("count");
  const list = activeFilter === "todos"
    ? allProducts
    : allProducts.filter(p => p["Categoria"] === activeFilter);

  countEl.textContent = list.length + " produto" + (list.length !== 1 ? "s" : "");

  if (list.length === 0) {
    grid.innerHTML = '<div class="empty">Nenhum produto disponível nesta categoria.</div>';
    return;
  }

  grid.innerHTML = list.map(p => {
    const imgUrl = p["Imagem URL"] || "";
    const pvp = p["PVP (€)"] ? parseFloat(p["PVP (€)"]).toFixed(2) + " €" : "";
    const kcal = p["Kcal por dose"] || "";
    const prot = p["Proteína"] ? parseFloat(p["Proteína"]).toFixed(1) + "g" : "—";
    const hidr = p["Hidratos de Carbono"] ? parseFloat(p["Hidratos de Carbono"]).toFixed(1) + "g" : "—";
    const fibra = p["Fibra"] ? parseFloat(p["Fibra"]).toFixed(1) + "g" : "—";
    const cat = p["Categoria"] || "";
    const nome = p["Produto"] || "";
    const marca = p["Marca"] || "";

    return `
      <div class="card">
        <div class="card-img-wrap">
          ${imgUrl
            ? `<img src="${imgUrl}" alt="${nome}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
            : ''}
          <div class="img-placeholder" style="${imgUrl ? 'display:none' : 'display:flex'}">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#9ec4cc" stroke-width="1.5">
              <rect x="3" y="3" width="18" height="18" rx="3"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <path d="M21 15l-5-5L5 21"/>
            </svg>
          </div>
        </div>
        <div class="card-body">
          <span class="card-brand">${marca}</span>
          <span class="card-name">${nome}</span>
          <span class="cat-badge ${catClass(cat)}">${cat}</span>
          <div class="nutrients">
            <div class="nut"><span class="nut-val">${prot}</span><span class="nut-label">Proteína</span></div>
            <div class="nut"><span class="nut-val">${hidr}</span><span class="nut-label">Hidratos</span></div>
            <div class="nut"><span class="nut-val">${fibra}</span><span class="nut-label">Fibra</span></div>
          </div>
          <div class="card-footer">
            ${kcal ? `<div class="kcal-wrap"><span class="kcal">${kcal}</span><span class="kcal-label">kcal/dose</span></div>` : '<span></span>'}
            <span class="pvp">${pvp}</span>
          </div>
        </div>
      </div>
    `;
  }).join("");
}

async function loadProducts() {
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error("Erro ao carregar dados");
    const text = await res.text();
    const all = parseCSV(text);
    allProducts = all.filter(p => (p["Disponivel"] || "").toLowerCase() === "sim");
    buildFilters(allProducts);
    renderGrid();
  } catch (err) {
    document.getElementById("grid").innerHTML = '<div class="error">Não foi possível carregar os produtos. Tenta novamente mais tarde.</div>';
  }
}

loadProducts();
</script>
</body>
</html>
